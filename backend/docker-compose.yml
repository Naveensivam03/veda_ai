services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vedaai-backend
    restart: unless-stopped
    command: bun run dev
    env_file:
      - .env
    environment:
      PORT: 5000
      MONGODB_URI: mongodb://mongodb:27017/vedaai
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - "5000:5000"
    volumes:
      - .:/app
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vedaai-worker
    restart: unless-stopped
    command: bun run worker
    env_file:
      - .env
    environment:
      PORT: 5000
      MONGODB_URI: mongodb://mongodb:27017/vedaai
      REDIS_HOST: redis
      REDIS_PORT: 6379
    volumes:
      - .:/app
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy

  mongodb:
    image: mongo:7
    container_name: vedaai-mongodb
    restart: unless-stopped
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    # Redis is intentionally internal-only; backend and worker reach it over the Docker network.
    image: redis:7-alpine
    container_name: vedaai-redis
    restart: unless-stopped
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  mongodb_data:
